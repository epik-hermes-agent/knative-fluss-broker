# Docker Compose for local development and integration testing.
# Brings up: ZooKeeper, Fluss, MinIO, Hive Metastore, PostgreSQL (for HMS).
#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d fluss zookeeper    # Core broker services only
#   docker compose --profile lakehouse up -d # Full lakehouse stack
#   docker compose down -v                  # Tear down + remove volumes

version: "3.8"

services:
  # ──────────────────────────────────────────────
  # ZooKeeper (required by Fluss)
  # ──────────────────────────────────────────────
  zookeeper:
    image: zookeeper:3.9
    container_name: fluss-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/data
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Apache Fluss (coordinator + tablet node)
  # ──────────────────────────────────────────────
  fluss-coordinator:
    image: apache/fluss:0.9.0-incubating
    container_name: fluss-coordinator
    ports:
      - "9123:9123"   # Fluss client port
    environment:
      FLUSS_NODE_TYPE: coordinator
      FLUSS_ZOOKEEPER_ADDRESS: zookeeper:2181
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - fluss-coordinator-data:/data

  fluss-tablet:
    image: apache/fluss:0.9.0-incubating
    container_name: fluss-tablet
    environment:
      FLUSS_NODE_TYPE: tablet
      FLUSS_ZOOKEEPER_ADDRESS: zookeeper:2181
      FLUSS_COORDINATOR_ADDRESS: fluss-coordinator:9123
    depends_on:
      fluss-coordinator:
        condition: service_started
    volumes:
      - fluss-tablet-data:/data

  # ──────────────────────────────────────────────
  # MinIO (S3-compatible storage for Iceberg)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: fluss-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: fluss-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/iceberg-warehouse;
      mc mb --ignore-existing local/fluss-tiering;
      echo 'MinIO buckets created';
      "

  # ──────────────────────────────────────────────
  # PostgreSQL (Hive Metastore backend)
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fluss-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles:
      - lakehouse

  # ──────────────────────────────────────────────
  # Hive Metastore (Iceberg catalog)
  # ──────────────────────────────────────────────
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: fluss-hive-metastore
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: "-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=hive -Dhive.metastore.warehouse.dir=s3a://iceberg-warehouse/"
    depends_on:
      postgres:
        condition: service_started
    profiles:
      - lakehouse

  # ──────────────────────────────────────────────
  # Flink (for tiering services)
  # ──────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.20-java21
    container_name: fluss-flink-jobmanager
    ports:
      - "8081:8081"   # Flink Web UI
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    command: jobmanager
    profiles:
      - lakehouse

  flink-taskmanager:
    image: flink:1.20-java21
    container_name: fluss-flink-taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: hashmap
    command: taskmanager
    depends_on:
      - flink-jobmanager
    profiles:
      - lakehouse

volumes:
  zookeeper-data:
  fluss-coordinator-data:
  fluss-tablet-data:
  minio-data:
  postgres-data:
