apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: brokers.eventing.fluss.io
  labels:
    app.kubernetes.io/name: knative-fluss-broker
    app.kubernetes.io/part-of: knative-fluss-broker
spec:
  group: eventing.fluss.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                fluss:
                  type: object
                  description: Fluss connection configuration
                  properties:
                    endpoint:
                      type: string
                      description: "Fluss bootstrap server (e.g., fluss://fluss-release:9123)"
                      default: "fluss://fluss-release:9123"
                    writeBatchSize:
                      type: integer
                      default: 100
                    writeBatchTimeoutMs:
                      type: integer
                      default: 50
                    ackTimeoutMs:
                      type: integer
                      default: 10000
                    writeMaxRetries:
                      type: integer
                      default: 3
                    writeRetryBackoffMs:
                      type: integer
                      default: 100
                ingress:
                  type: object
                  description: Ingress deployment configuration
                  properties:
                    replicas:
                      type: integer
                      minimum: 1
                      maximum: 10
                      default: 1
                    resources:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "100m"
                        memory:
                          type: string
                          default: "256Mi"
                schema:
                  type: object
                  description: Schema registry configuration
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    evolutionPolicy:
                      type: string
                      enum: [backward, forward, full, none]
                      default: backward
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                addresses:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      url:
                        type: string
                observedGeneration:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: ".status.conditions[?(@.type=='Ready')].status"
        - name: Address
          type: string
          jsonPath: ".status.addresses[0].url"
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: brokers
    singular: broker
    kind: Broker
    shortNames:
      - fb
    categories:
      - all
      - knative
      - eventing
