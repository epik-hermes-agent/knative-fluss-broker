apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluss-broker-controller
  labels:
    app.kubernetes.io/name: fluss-broker
    app.kubernetes.io/component: controller
rules:
  # Broker CRD
  - apiGroups: ["eventing.fluss.io"]
    resources: ["brokers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["eventing.fluss.io"]
    resources: ["brokers/status", "brokers/finalizers"]
    verbs: ["get", "update", "patch"]
  # Trigger CRD
  - apiGroups: ["eventing.fluss.io"]
    resources: ["triggers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["eventing.fluss.io"]
    resources: ["triggers/status", "triggers/finalizers"]
    verbs: ["get", "update", "patch"]
  # Core resources for creating Deployments, Services, ConfigMaps
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events for logging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Namespaces for multi-namespace support
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
