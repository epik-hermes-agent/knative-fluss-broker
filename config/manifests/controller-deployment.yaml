apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluss-broker-controller
  namespace: knative-fluss-broker
  labels:
    app.kubernetes.io/name: fluss-broker
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fluss-broker
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluss-broker
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: fluss-broker-controller
      containers:
        - name: controller
          image: fluss-broker-controller:dev
          imagePullPolicy: Never
          env:
            - name: FLUSS_ENDPOINT
              value: "fluss://coordinator-server-hs.default.svc.cluster.local:9123"
            - name: CONTROLLER_NAMESPACE
              value: "default"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
