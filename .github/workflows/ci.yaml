name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Run integration tests
        run: ./gradlew integrationTest
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Build
        run: ./gradlew build -x test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"

  lakehouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Start lakehouse stack
        run: docker compose --profile lakehouse up -d

      - name: Wait for services
        run: sleep 30

      - name: Run lakehouse tests
        run: ./gradlew test integrationTest e2eTest -Plakehouse
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Stop lakehouse stack
        if: always()
        run: docker compose --profile lakehouse down -v

  k8s-e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Create Kind cluster
        run: ./hack/test-e2e-kind-up.sh

      - name: Install Knative Eventing
        run: ./hack/test-e2e-install-knative.sh

      - name: Install ZooKeeper + Fluss
        run: ./hack/test-e2e-install-fluss.sh

      - name: Build and deploy controller
        run: ./hack/test-e2e-deploy-app.sh

      - name: Run K8s e2e test
        run: ./hack/test-e2e-run.sh

      - name: Collect debug info
        if: failure()
        run: ./hack/test-e2e-collect-debug.sh

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-e2e-debug
          path: "e2e-debug-*/**"

      - name: Cleanup Kind cluster
        if: always()
        run: ./hack/test-e2e-kind-down.sh
