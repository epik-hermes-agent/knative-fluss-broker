apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: triggers.eventing.fluss.io
  labels:
    app.kubernetes.io/name: knative-fluss-broker
    app.kubernetes.io/part-of: knative-fluss-broker
spec:
  group: eventing.fluss.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [broker, subscriber]
              properties:
                broker:
                  type: string
                  description: "Name of the Broker this trigger belongs to"
                filter:
                  type: object
                  description: "CloudEvent attribute filters"
                  properties:
                    attributes:
                      type: object
                      additionalProperties:
                        type: string
                      description: "Key-value pairs matching CloudEvent attributes (e.g., type, source)"
                subscriber:
                  type: object
                  required: [uri]
                  properties:
                    uri:
                      type: string
                      description: "Subscriber HTTP endpoint URI"
                      pattern: "^https?://"
                    delivery:
                      type: object
                      description: "Delivery retry configuration"
                      properties:
                        retry:
                          type: integer
                          minimum: 0
                          maximum: 100
                          default: 5
                          description: "Max retry attempts"
                        backoffPolicy:
                          type: string
                          enum: [linear, exponential]
                          default: exponential
                          description: "Retry backoff strategy"
                        backoffDelay:
                          type: string
                          default: "PT1S"
                          description: "Initial backoff delay (ISO 8601 duration)"
                        deadLetterSink:
                          type: object
                          description: "Dead letter queue endpoint"
                          properties:
                            uri:
                              type: string
                              pattern: "^https?://"
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                observedGeneration:
                  type: integer
                subscriberUri:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Broker
          type: string
          jsonPath: .spec.broker
        - name: Subscriber
          type: string
          jsonPath: .spec.subscriber.uri
        - name: Ready
          type: string
          jsonPath: ".status.conditions[?(@.type=='Ready')].status"
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: triggers
    singular: trigger
    kind: Trigger
    shortNames:
      - ft
    categories:
      - all
      - knative
      - eventing
