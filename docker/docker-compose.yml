# Docker Compose for local development and integration testing.
# Brings up: ZooKeeper, Fluss, LocalStack (S3+STS), Flink (for tiering), Polaris (Iceberg catalog).
#
# Usage:
#   docker compose up -d                                    # Core services (Fluss + ZK + LocalStack)
#   docker compose --profile lakehouse up -d                # Full lakehouse stack (Flink + tiering)
#   docker compose down -v                                  # Tear down + remove volumes
#
# Fluss 1.0-SNAPSHOT (locally built from apache/fluss main, commit a0260f4).
# Plugins (fluss-fs-s3, fluss-lake-iceberg) are baked into the image — no plugin-init needed.
#
# S3 STS: Uses s3.assumed.role.sts.endpoint to direct STS calls to LocalStack
# instead of AWS. The $lake system table is Fluss's standard API for querying
# Iceberg-tiered data.
#
# Iceberg tiering uses Fluss's BUILT-IN lake connector (fluss-lake-iceberg plugin)
# and pre-built Flink job (fluss-flink-tiering JAR). No custom tiering code.
#
# Flink tiering JARs are bind-mounted from local Fluss build at:
#   /Users/pasha/hermes/fluss-main/

networks:
  fluss-net:
    driver: bridge

services:
  # ──────────────────────────────────────────────
  # Fluss Dependency Init — downloads Hadoop JARs needed by Iceberg plugin
  # (not bundled in the Fluss 1.0-SNAPSHOT image)
  # ──────────────────────────────────────────────
  fluss-dep-init:
    image: apache/fluss:1.0-SNAPSHOT
    container_name: fluss-dep-init
    user: root
    networks:
      - fluss-net
    volumes:
      - fluss-plugins:/staging
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Copy ALL built-in plugins from the image to the staging volume
        cp -r /opt/fluss/plugins/* /staging/
        # Add Hadoop JARs needed by Iceberg plugin (not bundled in the image)
        curl -fL -o /staging/iceberg/hadoop-client-api-3.3.5.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-client-api/3.3.5/hadoop-client-api-3.3.5.jar
        curl -fL -o /staging/iceberg/hadoop-client-runtime-3.3.5.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-client-runtime/3.3.5/hadoop-client-runtime-3.3.5.jar
        echo 'Fluss plugins ready:' && find /staging -name "*.jar" | sort

  # ──────────────────────────────────────────────
  # ZooKeeper (required by Fluss)
  # ──────────────────────────────────────────────
  zookeeper:
    image: zookeeper:3.9
    container_name: fluss-zookeeper
    networks:
      - fluss-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/data
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Apache Fluss Coordinator Server
  # Two listeners:
  #   INTERNAL (port 9125) — for tablet servers and tiering job inside Docker
  #   CLIENT   (port 9123) — for host-side Java clients
  # ──────────────────────────────────────────────
  fluss-coordinator:
    image: apache/fluss:1.0-SNAPSHOT
    container_name: fluss-coordinator
    command: coordinatorServer
    networks:
      - fluss-net
    ports:
      - "9123:9123"   # CLIENT listener for host
      - "9125:9125"   # INTERNAL listener for Docker network
      - "9127:9127"   # GATEWAY listener for Docker-side clients (SQL Gateway, TUI)
    environment:
      FLUSS_PROPERTIES: |
        zookeeper.address: zookeeper:2181
        bind.listeners: INTERNAL://fluss-coordinator:9125, CLIENT://fluss-coordinator:9123, GATEWAY://fluss-coordinator:9127
        advertised.listeners: INTERNAL://fluss-coordinator:9125, CLIENT://localhost:9123, GATEWAY://fluss-coordinator:9127
        internal.listener.name: INTERNAL
        data.dir: /tmp/fluss-data
        remote.data.dir: s3://fluss-data/remote
        s3.endpoint: http://localstack:4566
        s3.access-key: test
        s3.secret-key: test
        s3.region: us-east-1
        s3.path-style-access: true
        s3.assumed.role.arn: arn:aws:iam::000000000000:role/fluss-delegation
        s3.assumed.role.sts.endpoint: http://localstack:4566
        datalake.format: iceberg
        datalake.freshness: 10s
        datalake.iceberg.type: rest
        datalake.iceberg.uri: http://polaris:8181/api/catalog
        datalake.iceberg.warehouse: fluss
        datalake.iceberg.credential: root:s3cr3t
        datalake.iceberg.scope: PRINCIPAL_ROLE:ALL
        datalake.iceberg.s3.endpoint: http://localstack:4566
        datalake.iceberg.s3.access-key-id: test
        datalake.iceberg.s3.secret-access-key: test
        datalake.iceberg.s3.path.style.access: "true"
        datalake.iceberg.s3.region: us-east-1
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      fluss-dep-init:
        condition: service_completed_successfully
      zookeeper:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
      polaris-setup:
        condition: service_completed_successfully
    volumes:
      - fluss-coordinator-data:/data
      - fluss-plugins:/opt/fluss/plugins:ro

  # ──────────────────────────────────────────────
  # Apache Fluss Tablet Server
  # Connects to coordinator via INTERNAL listener
  # ──────────────────────────────────────────────
  fluss-tablet:
    image: apache/fluss:1.0-SNAPSHOT
    container_name: fluss-tablet
    command: tabletServer
    networks:
      - fluss-net
    ports:
      - "9126:9123"   # CLIENT listener for host clients
      - "9128:9128"   # GATEWAY listener for Docker-side clients (SQL Gateway)
    environment:
      FLUSS_PROPERTIES: |
        zookeeper.address: zookeeper:2181
        bind.listeners: INTERNAL://fluss-tablet:9124, CLIENT://fluss-tablet:9123, GATEWAY://fluss-tablet:9128
        advertised.listeners: INTERNAL://fluss-tablet:9124, CLIENT://localhost:9126, GATEWAY://fluss-tablet:9128
        internal.listener.name: INTERNAL
        tablet-server.id: 0
        data.dir: /tmp/fluss-data
        remote.data.dir: s3://fluss-data/remote
        s3.endpoint: http://localstack:4566
        s3.access-key: test
        s3.secret-key: test
        s3.region: us-east-1
        s3.path-style-access: true
        s3.assumed.role.arn: arn:aws:iam::000000000000:role/fluss-delegation
        s3.assumed.role.sts.endpoint: http://localstack:4566
        datalake.format: iceberg
        datalake.freshness: 10s
        datalake.iceberg.type: rest
        datalake.iceberg.uri: http://polaris:8181/api/catalog
        datalake.iceberg.warehouse: fluss
        datalake.iceberg.credential: root:s3cr3t
        datalake.iceberg.scope: PRINCIPAL_ROLE:ALL
        datalake.iceberg.s3.endpoint: http://localstack:4566
        datalake.iceberg.s3.access-key-id: test
        datalake.iceberg.s3.secret-access-key: test
        datalake.iceberg.s3.path.style.access: "true"
        datalake.iceberg.s3.region: us-east-1
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      fluss-dep-init:
        condition: service_completed_successfully
      fluss-coordinator:
        condition: service_started
    volumes:
      - fluss-tablet-data:/data
      - fluss-plugins:/opt/fluss/plugins:ro

  # ──────────────────────────────────────────────
  # Fluss Broker Ingress (HTTP CloudEvent receiver)
  # Accepts CloudEvents via HTTP POST at /{namespace}/{broker}
  # Binary mode: ce-* headers + body
  # Structured mode: application/cloudevents+json
  # ──────────────────────────────────────────────
  fluss-ingress:
    build:
      context: ..
      dockerfile: docker/Dockerfile.broker
    container_name: fluss-ingress
    networks:
      - fluss-net
    ports:
      - "8080:8080"
    environment:
      FLUSS_HOST: fluss-coordinator
      FLUSS_PORT: 9123
      SERVER_PORT: 8080
    depends_on:
      fluss-coordinator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # LocalStack (S3 + STS)
  # S3 on port 4566 + STS on same port
  # Using 4.6.0 (last free community edition, no auth required)
  # ──────────────────────────────────────────────
  localstack:
    image: localstack/localstack:4.6.0
    container_name: fluss-localstack
    networks:
      - fluss-net
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sts,iam
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\"'"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack-init:
    image: localstack/localstack:4.6.0
    container_name: fluss-localstack-init
    networks:
      - fluss-net
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export AWS_ENDPOINT_URL=http://localstack:4566
        # Clean up stale Iceberg data from previous runs (prevents table ID mismatch)
        awslocal s3 rm s3://iceberg-warehouse/ --recursive 2>/dev/null || true
        # Create S3 buckets
        awslocal s3 mb s3://fluss-data
        awslocal s3 mb s3://iceberg-warehouse
        echo "LocalStack init complete: buckets created, stale data cleaned"

  # ──────────────────────────────────────────────
  # Apache Polaris — Iceberg REST Catalog (in-memory mode)
  # ──────────────────────────────────────────────
  polaris:
    image: apache/polaris:1.3.0-incubating
    container_name: polaris
    networks:
      - fluss-net
    ports:
      - "8181:8181"
    environment:
      # Bootstrap credentials (realm, clientId, clientSecret)
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,root,s3cr3t
      # Realms
      POLARIS_REALM_CONTEXT_REALMS: POLARIS
      POLARIS_DEFAULT_REALM: POLARIS
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8181/api/catalog/v1/oauth/tokens -d 'grant_type=client_credentials&client_id=root&client_secret=s3cr3t&scope=PRINCIPAL_ROLE:ALL' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  # ──────────────────────────────────────────────
  # Polaris Bootstrap — creates catalog + namespace
  # ──────────────────────────────────────────────
  polaris-setup:
    image: alpine:3.19
    container_name: polaris-setup
    networks:
      - fluss-net
    depends_on:
      polaris:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache curl;
        /scripts/polaris-setup.sh;
    volumes:
      - ./polaris-setup.sh:/scripts/polaris-setup.sh:ro

  # ──────────────────────────────────────────────
  # Flink Init — downloads non-Fluss JARs from Maven Central.
  # Fluss JARs (fluss-flink-1.20, fluss-lake-iceberg, fluss-flink-tiering)
  # are bind-mounted from local build into flink-lib and flink-opt volumes.
  # ──────────────────────────────────────────────
  flink-init:
    image: flink:1.20.3-scala_2.12-java17
    container_name: fluss-flink-init
    networks:
      - fluss-net
    volumes:
      - flink-lib:/opt/flink/lib
      - flink-opt:/opt/flink/opt
      - /Users/pasha/hermes/fluss-main/fluss-flink/fluss-flink-1.20/target/fluss-flink-1.20-1.0-SNAPSHOT.jar:/staging/fluss-flink-1.20.jar:ro
      - /Users/pasha/hermes/fluss-main/fluss-lake/fluss-lake-iceberg/target/fluss-lake-iceberg-1.0-SNAPSHOT.jar:/staging/fluss-lake-iceberg.jar:ro
      - /Users/pasha/hermes/fluss-main/fluss-flink/fluss-flink-tiering/target/fluss-flink-tiering-1.0-SNAPSHOT.jar:/staging/fluss-flink-tiering.jar:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Copy Fluss JARs from bind mounts to shared volumes
        cp /staging/fluss-flink-1.20.jar /opt/flink/lib/fluss-flink-1.20-1.0-SNAPSHOT.jar
        cp /staging/fluss-lake-iceberg.jar /opt/flink/lib/fluss-lake-iceberg-1.0-SNAPSHOT.jar
        cp /staging/fluss-flink-tiering.jar /opt/flink/opt/fluss-flink-tiering-1.0-SNAPSHOT.jar
        # Download non-Fluss dependencies from Maven Central
        curl -fL -o /opt/flink/lib/iceberg-flink-runtime-1.20-1.10.1.jar https://repo1.maven.org/maven2/org/apache/iceberg/iceberg-flink-runtime-1.20/1.10.1/iceberg-flink-runtime-1.20-1.10.1.jar
        curl -fL -o /opt/flink/lib/iceberg-aws-bundle-1.10.1.jar https://repo1.maven.org/maven2/org/apache/iceberg/iceberg-aws-bundle/1.10.1/iceberg-aws-bundle-1.10.1.jar
        curl -fL -o /opt/flink/lib/hadoop-client-api-3.3.5.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-client-api/3.3.5/hadoop-client-api-3.3.5.jar
        curl -fL -o /opt/flink/lib/hadoop-client-runtime-3.3.5.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-client-runtime/3.3.5/hadoop-client-runtime-3.3.5.jar
        echo "Flink JARs ready:" && ls -lh /opt/flink/lib/*.jar /opt/flink/opt/*.jar
    profiles:
      - lakehouse

  # ──────────────────────────────────────────────
  # Flink JobManager
  # ──────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.20.3-scala_2.12-java17
    container_name: fluss-flink-jobmanager
    networks:
      - fluss-net
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    command: jobmanager
    depends_on:
      flink-init:
        condition: service_completed_successfully
    volumes:
      - flink-lib:/opt/flink/lib:ro
      - flink-opt:/opt/flink/opt:ro
    profiles:
      - lakehouse

  # ──────────────────────────────────────────────
  # Flink TaskManager
  # ──────────────────────────────────────────────
  flink-taskmanager:
    image: flink:1.20.3-scala_2.12-java17
    container_name: fluss-flink-taskmanager
    networks:
      - fluss-net
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        state.backend: hashmap
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_started
    volumes:
      - flink-lib:/opt/flink/lib:ro
      - flink-opt:/opt/flink/opt:ro
    profiles:
      - lakehouse

  # ──────────────────────────────────────────────
  # Tiering Job Submission (one-shot)
  # Connects to Fluss via INTERNAL listener (fluss-coordinator:9125)
  # so the advertised address is reachable from inside Docker.
  # ──────────────────────────────────────────────
  flink-tiering-submit:
    image: flink:1.20.3-scala_2.12-java17
    container_name: fluss-flink-tiering-submit
    networks:
      - fluss-net
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      fluss-coordinator:
        condition: service_started
      fluss-tablet:
        condition: service_started
      polaris:
        condition: service_healthy
    volumes:
      - flink-lib:/opt/flink/lib:ro
      - flink-opt:/opt/flink/opt:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 25;
        /opt/flink/bin/flink run -d -m flink-jobmanager:8081 /opt/flink/opt/fluss-flink-tiering-1.0-SNAPSHOT.jar \
          --fluss.bootstrap.servers fluss-coordinator:9125 \
          --datalake.format iceberg \
          --datalake.iceberg.type rest \
          --datalake.iceberg.uri http://polaris:8181/api/catalog \
          --datalake.iceberg.warehouse fluss \
          --datalake.iceberg.credential root:s3cr3t \
          --datalake.iceberg.scope PRINCIPAL_ROLE:ALL \
          --datalake.iceberg.s3.endpoint http://localstack:4566 \
          --datalake.iceberg.s3.access-key-id test \
          --datalake.iceberg.s3.secret-access-key test \
          --datalake.iceberg.s3.path.style.access true \
          --datalake.iceberg.s3.region us-east-1 \
          --execution.checkpointing.interval 10s;
        echo 'Tiering job submitted';
    profiles:
      - lakehouse

  # ──────────────────────────────────────────────
  # Flink SQL Gateway — REST API for TUI dashboard queries
  # Starts on port 8083 by default
  # ──────────────────────────────────────────────
  flink-sql-gateway:
    image: flink:1.20.3-scala_2.12-java17
    container_name: fluss-flink-sql-gateway
    networks:
      - fluss-net
    ports:
      - "8083:8083"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    command: /opt/flink/bin/sql-gateway.sh start-foreground -Dsql-gateway.endpoint.rest.address=0.0.0.0
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
    volumes:
      - flink-lib:/opt/flink/lib:ro
      - flink-opt:/opt/flink/opt:ro
    profiles:
      - lakehouse

volumes:
  zookeeper-data:
  fluss-coordinator-data:
  fluss-tablet-data:
  fluss-plugins:
  localstack-data:
  flink-lib:
  flink-opt:
